services:
  relay:
    build: .
    restart: unless-stopped
    environment:
      PORT: ${PORT:-9000}
      REMODEX_RELAY_HOST: ${REMODEX_RELAY_HOST:-0.0.0.0}
      REMODEX_TRUST_PROXY: ${REMODEX_TRUST_PROXY:-false}
      REMODEX_RELAY_EXPOSE_DETAILED_HEALTH: ${REMODEX_RELAY_EXPOSE_DETAILED_HEALTH:-false}
      REMODEX_RELAY_UPGRADE_WINDOW_MS: ${REMODEX_RELAY_UPGRADE_WINDOW_MS:-60000}
      REMODEX_RELAY_UPGRADE_MAX_PER_WINDOW: ${REMODEX_RELAY_UPGRADE_MAX_PER_WINDOW:-60}
    ports:
      - "${REMODEX_RELAY_BIND_HOST:-127.0.0.1}:${PORT:-9000}:${PORT:-9000}"
    expose:
      - "${PORT:-9000}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:9000/health"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
